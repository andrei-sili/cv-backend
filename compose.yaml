services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: cvdb
      POSTGRES_USER: cvuser
      POSTGRES_PASSWORD: cvpass
    ports:
      - "5432:5432"
    volumes:
      - cv-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvuser -d cvdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cvdb
      SPRING_DATASOURCE_USERNAME: cvuser
      SPRING_DATASOURCE_PASSWORD: cvpass
    depends_on:
      db:
        condition: service_healthy

volumes:
  cv-pgdata: